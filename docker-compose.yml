services:
  mysql:
    image: mysql:8.0
    container_name: innovatech-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: innovatech_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - innovatech-net

  backend-ventas:
    build: .
    container_name: innovatech-ventas
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/innovatech_db
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: innovatech_db
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      - mysql
    networks:
      - innovatech-net

networks:
  innovatech-net:
    driver: bridge

volumes:
  mysql_data:
    driver: local
