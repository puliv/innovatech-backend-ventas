version: "3.9"

services:

  mysql:
    image: mysql:8.0
    container_name: innovatech-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - innovatech-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend-ventas:
    image: ${DOCKER_USERNAME}/innovatech-backend-ventas:${IMAGE_TAG:-latest}
    container_name: innovatech-ventas
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - innovatech-net

  backend-despacho:
    image: ${DOCKER_USERNAME}/innovatech-backend-despacho:${IMAGE_TAG:-latest}
    container_name: innovatech-despacho
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - innovatech-net

  frontend:
    image: ${DOCKER_USERNAME}/innovatech-frontend:${IMAGE_TAG:-latest}
    container_name: innovatech-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend-ventas
      - backend-despacho
    networks:
      - innovatech-net

volumes:
  mysql_data:
    driver: local

networks:
  innovatech-net:
    driver: bridge